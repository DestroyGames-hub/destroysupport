<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destroy Studios — Destek</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f; color: #e8e8f0;
  font-family: 'DM Mono', monospace;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(255,60,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,60,60,0.03) 1px,transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
header {
  position: relative; z-index: 10; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #2a2a3a; background: rgba(10,10,15,0.97);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 38px; height: 38px; background: #ff3c3c; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne',sans-serif; font-weight: 800; font-size: 18px; color: white;
  box-shadow: 0 0 20px rgba(255,60,60,0.4);
}
.logo-name { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 16px; }
.logo-name span { color: #ff3c3c; }
.logo-sub { font-size: 10px; color: #6b6b88; letter-spacing: .15em; text-transform: uppercase; margin-top: 1px; }
.status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #6b6b88; letter-spacing: .08em; text-transform: uppercase; }
.dot { width: 7px; height: 7px; background: #3ddc84; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.tabs {
  position: relative; z-index: 10; padding: 10px 20px;
  border-bottom: 1px solid #2a2a3a; background: #111118;
  display: flex; gap: 8px; overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1px solid #2a2a3a; background: transparent;
  color: #6b6b88; font-family: 'DM Mono',monospace;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s;
}
.tab.active,.tab:hover { border-color: #ff3c3c; color: #ff3c3c; background: rgba(255,60,60,.08); }
#chat {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; z-index: 1;
  scrollbar-width: thin; scrollbar-color: #2a2a3a transparent;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
.welcome { text-align: center; padding: 30px 16px; animation: fadeIn .5s; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.welcome-icon { font-size: 44px; margin-bottom: 14px; display: block; }
.welcome h2 { font-family: 'Syne',sans-serif; font-size: 20px; margin-bottom: 8px; }
.welcome p { font-size: 12px; color: #6b6b88; line-height: 1.7; max-width: 400px; margin: 0 auto 22px; }
.quick-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; margin: 0 auto; }
.qbtn {
  padding: 7px 14px; border-radius: 8px; border: 1px solid #2a2a3a;
  background: #111118; color: #e8e8f0; font-family: 'DM Mono',monospace;
  font-size: 12px; cursor: pointer; transition: all .2s;
}
.qbtn:hover { border-color: #ff8c42; color: #ff8c42; }
.msg { display: flex; gap: 10px; animation: msgIn .3s ease; max-width: 82%; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.avatar {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; margin-top: 2px; font-family: 'Syne',sans-serif;
}
.msg.ai .avatar { background: linear-gradient(135deg,#ff3c3c,#ff8c42); color: white; }
.msg.user .avatar { background: #1a1a24; border: 1px solid #2a2a3a; font-size: 14px; }
.bubble { padding: 11px 15px; font-size: 13px; line-height: 1.7; max-width: 100%; border-radius: 12px; }
.msg.ai .bubble { background: #16161f; border: 1px solid #2a2a3a; border-top-left-radius: 4px; }
.msg.user .bubble { background: #1e1e2e; border: 1px solid rgba(255,60,60,.18); border-top-right-radius: 4px; }
.bubble b { color: #ff8c42; }
.typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #6b6b88; animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-area {
  position: relative; z-index: 10; padding: 14px 20px;
  border-top: 1px solid #2a2a3a; background: rgba(10,10,15,0.97);
}
.input-row {
  display: flex; gap: 10px; align-items: flex-end;
  background: #111118; border: 1px solid #2a2a3a;
  border-radius: 12px; padding: 10px 12px; transition: border-color .2s;
}
.input-row:focus-within { border-color: rgba(255,60,60,.4); box-shadow: 0 0 0 3px rgba(255,60,60,.06); }
#inp {
  flex: 1; background: transparent; border: none; outline: none;
  color: #e8e8f0; font-family: 'DM Mono',monospace; font-size: 13px;
  resize: none; line-height: 1.5; max-height: 120px; overflow-y: auto;
}
#inp::placeholder { color: #6b6b88; }
#sendBtn {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: #ff3c3c; color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}
#sendBtn:hover{background:#ff5555;transform:scale(1.05)}
#sendBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.hint { font-size: 10px; color: #6b6b88; text-align: center; margin-top: 7px; letter-spacing: .06em; }
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <div class="logo-icon">D</div>
    <div>
      <div class="logo-name"><span>Destroy</span> Studios</div>
      <div class="logo-sub">Müşteri Destek</div>
    </div>
  </div>
  <div class="status"><span class="dot"></span>AI Çevrimiçi</div>
</header>
<div class="tabs">
  <button class="tab active" onclick="setTab('Destroy Studios',this)">Destroy Studios</button>
  <button class="tab" onclick="setTab('Destroy Games',this)">Destroy Games</button>
  <button class="tab" onclick="setTab('Destroy Music',this)">Destroy Music</button>
</div>
<div id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">💥</span>
    <h2>Merhaba! Nasıl yardımcı olabilirim?</h2>
    <p>Destroy Studios, Destroy Games ve Destroy Music ürünleri hakkında sorularını yanıtlayabilirim.</p>
    <div class="quick-grid">
      <button class="qbtn" onclick="quickSend('Yam uygulaması nedir?')">💬 Yam nedir?</button>
      <button class="qbtn" onclick="quickSend('Külçe Altın uygulaması nasıl çalışır?')">🥇 Külçe Altın</button>
      <button class="qbtn" onclick="quickSend('Cold Files oyunu hakkında bilgi ver')">🕵️ Cold Files</button>
      <button class="qbtn" onclick="quickSend('Terra Mania nasıl oynanır?')">🗺️ Terra Mania</button>
      <button class="qbtn" onclick="quickSend('KaraağaçOS nedir?')">💻 KaraağaçOS</button>
      <button class="qbtn" onclick="quickSend('Robalien oyunu nasıl bir oyun?')">🤖 Robalien</button>
      <button class="qbtn" onclick="quickSend('Destroy Music beat hizmeti nasıl çalışır?')">🎵 Destroy Music</button>
      <button class="qbtn" onclick="quickSend('Tüm ürünlerinizi listeler misiniz?')">📦 Tüm ürünler</button>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="inp" placeholder="Sorunuzu yazın..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enter ile gönder · Shift+Enter yeni satır</div>
</div>
<script>
const SYSTEM = `Sen Destroy Studios'un Türkçe konuşan, samimi ve yardımsever müşteri hizmetleri asistanısın. Sadece Türkçe cevap ver.

Şirket Yapısı:
- Destroy Studios (Ana şirket): Yam (mesajlaşma uygulaması), Külçe Altın (altın/gümüş fiyat takibi)
- Destroy Games: Cold Files (2D noir dedektif), Terra Mania (haritadan ülke bulma), KaraağaçOS (işletim sistemi simülasyonu), Robalien (sci-fi FPS uzaylı robot kaçış oyunu)
- Destroy Music: Şarkıcılara özel beat üretim hizmeti

Kısa, net, samimi cevaplar ver. Bilmediğin şeyler için destek ekibine yönlendir.`;

let history = [];
let company = 'Destroy Studios';
let busy = false;

function setTab(name, el) {
  company = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function quickSend(t) { document.getElementById('inp').value = t; send(); }

function addMsg(role, text) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'ai' ? 'DS' : '👤';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
  d.appendChild(av); d.appendChild(b);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function showTyping() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = 'DS';
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: `[${company}] ${text}` });
  busy = true; showTyping();

  try {
    // Pollinations AI - ücretsiz, keysiz
    const messages = [
      { role: 'system', content: SYSTEM },
      ...history
    ];
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        messages: messages,
        private: true
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.choices?.[0]?.message?.content || 'Üzgünüm, bir hata oluştu.';
    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply);
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Bağlantı hatası oluştu. Lütfen tekrar deneyin. Hata: ' + e.message);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inp').focus();
}
</script>
</body>
</html>
